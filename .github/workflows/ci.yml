name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Run replay evaluation
        run: python scripts/run_replay_eval.py --out /tmp/catousa-replay
      - name: Export public portfolio evidence
        run: python scripts/export_portfolio_evidence.py --out /tmp/portfolio-evidence.json
